<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Placement Eligibility Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container admin-panel" style="max-width: 900px;">
        <h1>⚙️ Admin Panel</h1>
        <div id="message"></div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <!-- Add Company Form -->
            <div>
                <h2>Add New Company</h2>
                <form id="addCompanyForm" onsubmit="addCompany(event)">
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" id="compName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Logo URL (optional)</label>
                        <input type="url" id="compLogo" placeholder="https://example.com/logo.png">
                    </div>
                    
                    <div class="form-group">
                        <label>Category</label>
                        <select id="compCategory" required>
                            <option value="Top">Top Company</option>
                            <option value="Average">Average Company</option>
                            <option value="Startup">Startup</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Type</label>
                        <select id="compType" required>
                            <option value="Product">Product Based</option>
                            <option value="Service">Service Based</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Branch Location</label>
                        <input type="text" id="compBranch" placeholder="e.g., Bangalore" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Role Offered</label>
                        <input type="text" id="compRole" placeholder="e.g., Software Engineer" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Minimum CGPA Required</label>
                        <input type="number" id="compCGPA" step="0.1" min="0" max="10" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Maximum Backlogs Allowed</label>
                        <input type="number" id="compBacklogs" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Placement Success Percentage</label>
                        <input type="number" id="compPercentage" min="0" max="100" required>
                    </div>
                    
                    <button type="submit" class="btn">Add Company</button>
                </form>
            </div>
            
            <!-- Company List -->
            <div>
                <h2>Existing Companies</h2>
                <div style="background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; max-height: 500px; overflow-y: auto;">
                    <table style="font-size: 0.9em;">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>CGPA</th>
                                <th>Backlogs</th>
                                <th>Category</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminCompanyList">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: 600;">
                ← Back to Login
            </a>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
