<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details - Placement Eligibility Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>📋 Enter Your Details</h1>
        <div id="message"></div>
        
        <form onsubmit="saveStudentDetails(event)">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label for="branch">Branch</label>
                <select id="branch" required>
                    <option value="">Select Branch</option>
                    <option value="CSE">Computer Science (CSE)</option>
                    <option value="IT">Information Technology (IT)</option>
                    <option value="ECE">Electronics & Communication (ECE)</option>
                    <option value="EEE">Electrical & Electronics (EEE)</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Civil">Civil</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="cgpa">CGPA (out of 10)</label>
                <input type="number" id="cgpa" step="0.01" min="0" max="10" placeholder="Enter your CGPA (e.g., 8.5)" required>
            </div>
            
            <div class="form-group">
                <label for="backlogs">Number of Backlogs</label>
                <input type="number" id="backlogs" min="0" placeholder="Enter number of active backlogs" required>
            </div>
            
            <div class="form-group">
                <label for="location">Preferred Location</label>
                <input type="text" id="location" placeholder="Enter preferred city (e.g., Bangalore)" required>
            </div>
            
            <button type="submit" class="btn">Check Eligibility →</button>
        </form>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
